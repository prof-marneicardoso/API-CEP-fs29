<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>API ViaCEP</title>
        <link rel="stylesheet" href="./css/style.css" />
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="container">
            <div class="form-header">
                <h2>Cadastro</h2>
                <p>Preencha seus dados e o endereço via CEP</p>
            </div>

            <form id="formCadastro">
                <!-- SEÇÃO: Dados Pessoais -->
                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input
                            type="text"
                            id="nome"
                            placeholder="Informe seu nome"
                        />
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="meu@email.com"
                        />
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input
                            type="password"
                            id="senha"
                            placeholder="Informe uma senha forte"
                        />
                    </div>
                </fieldset>

                <!-- SEÇÃO: Endereço -->
                <fieldset>
                    <legend>Endereço</legend>

                    <div class="form-row">
                        <div class="form-group group-cep">
                            <label for="cep">CEP</label>
                            <input
                                type="number"
                                id="cep"
                                placeholder="Ex: 01001000"
                            />
                        </div>
                        <div class="form-group group-logradouro">
                            <label for="logradouro">Logradouro</label>
                            <input
                                type="text"
                                id="logradouro"
                                placeholder="Rua, Avenida..."
                            />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group group-numero">
                            <label for="numero">Número</label>
                            <input type="text" id="numero" placeholder="Nº" />
                        </div>
                        <div class="form-group group-complemento">
                            <label for="complemento">Complemento</label>
                            <input
                                type="text"
                                id="complemento"
                                placeholder="Ap, bloco..."
                            />
                        </div>
                        <div class="form-group group-bairro">
                            <label for="bairro">Bairro</label>
                            <input
                                type="text"
                                id="bairro"
                                placeholder="Bairro"
                            />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group group-cidade">
                            <label for="cidade">Cidade</label>
                            <input
                                type="text"
                                id="cidade"
                                placeholder="Cidade"
                            />
                        </div>
                        <div class="form-group group-uf">
                            <label for="uf">UF</label>
                            <input
                                type="text"
                                id="uf"
                                pattern="[A-Z]{2}"
                                maxlength="2"
                                placeholder="UF"
                            />
                        </div>
                    </div>
                </fieldset>

                <!-- BOTÕES -->
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">
                        Cadastrar
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>
                </div>
            </form>
        </div>
    </body>
    <!-- Arquivo JS -->
    <script src="./js/app.js"></script>
</html>
