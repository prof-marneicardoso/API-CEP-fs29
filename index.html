<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API ViaCEP</title>
</head>
<body>
    <h2>API ViaCEP</h2>

    <form id="formCadastro">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Informe seu nome">

        <br><br>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="meu@email">

        <br><br>
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Informe uma senha forte">

        <hr>
        <label for="cep">CEP</label>
        <input
            type="number"
            id="cep"
            placeholder="Ex: 88888888">


    </form>
</body>
<!-- Arquivo JS -->
<script src="./js/app.js"></script>
</html>
